asyncapi: 3.1.0

info:
  title: NeuroGraph Event API
  version: 1.0.0
  description: >
    Async event specification for a brain-inspired knowledge graph.
    The system emits events when edges are learned, decayed, archived,
    and reactivated.

servers:
  local:
    host: localhost
    protocol: development
    description: Local development event publisher using console output

channels:
  graph.edge.learned:
    address: graph.edge.learned
    messages:
      edgeLearnedMessage:
        $ref: '#/components/messages/EdgeLearnedMessage'

  graph.edge.decayed:
    address: graph.edge.decayed
    messages:
      edgeDecayedMessage:
        $ref: '#/components/messages/EdgeDecayedMessage'

  graph.edge.archived:
    address: graph.edge.archived
    messages:
      edgeArchivedMessage:
        $ref: '#/components/messages/EdgeArchivedMessage'

  graph.edge.reactivated:
    address: graph.edge.reactivated
    messages:
      edgeReactivatedMessage:
        $ref: '#/components/messages/EdgeReactivatedMessage'

operations:
  publishEdgeLearned:
    action: send
    channel:
      $ref: '#/channels/graph.edge.learned'
    summary: Publish when an edge is created or strengthened through learning.
    messages:
      - $ref: '#/channels/graph.edge.learned/messages/edgeLearnedMessage'

  publishEdgeDecayed:
    action: send
    channel:
      $ref: '#/channels/graph.edge.decayed'
    summary: Publish when an active edge loses weight during decay.
    messages:
      - $ref: '#/channels/graph.edge.decayed/messages/edgeDecayedMessage'

  publishEdgeArchived:
    action: send
    channel:
      $ref: '#/channels/graph.edge.archived'
    summary: Publish when an edge falls below threshold and is archived.
    messages:
      - $ref: '#/channels/graph.edge.archived/messages/edgeArchivedMessage'

  publishEdgeReactivated:
    action: send
    channel:
      $ref: '#/channels/graph.edge.reactivated'
    summary: Publish when an archived edge becomes active again after learning.
    messages:
      - $ref: '#/channels/graph.edge.reactivated/messages/edgeReactivatedMessage'

components:
  messages:
    EdgeLearnedMessage:
      name: EdgeLearnedMessage
      title: Edge learned
      summary: An edge was created or strengthened through Hebbian learning.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/EdgeLearnedPayload'

    EdgeDecayedMessage:
      name: EdgeDecayedMessage
      title: Edge decayed
      summary: An active edge lost weight during decay.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/EdgeDecayedPayload'

    EdgeArchivedMessage:
      name: EdgeArchivedMessage
      title: Edge archived
      summary: An edge was soft-pruned and marked inactive.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/EdgeArchivedPayload'

    EdgeReactivatedMessage:
      name: EdgeReactivatedMessage
      title: Edge reactivated
      summary: An inactive archived edge became active again after learning.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/EdgeReactivatedPayload'

  schemas:
    EdgeLearnedPayload:
      type: object
      required:
        - event_id
        - event_type
        - timestamp
        - network_id
        - edge_id
        - source_node_id
        - target_node_id
        - relationship_type
        - old_weight
        - new_weight
        - activation_count
        - was_active
        - is_active
      properties:
        event_id:
          type: string
        event_type:
          type: string
          enum: [edge.learned]
        timestamp:
          type: string
          format: date-time
        network_id:
          type: integer
        edge_id:
          type: integer
        source_node_id:
          type: integer
        target_node_id:
          type: integer
        relationship_type:
          type: string
        old_weight:
          type: number
          format: float
        new_weight:
          type: number
          format: float
        activation_count:
          type: integer
        was_active:
          type: boolean
        is_active:
          type: boolean

    EdgeDecayedPayload:
      type: object
      required:
        - event_id
        - event_type
        - timestamp
        - network_id
        - edge_id
        - source_node_id
        - target_node_id
        - old_weight
        - new_weight
        - was_active
        - is_active
      properties:
        event_id:
          type: string
        event_type:
          type: string
          enum: [edge.decayed]
        timestamp:
          type: string
          format: date-time
        network_id:
          type: integer
        edge_id:
          type: integer
        source_node_id:
          type: integer
        target_node_id:
          type: integer
        old_weight:
          type: number
          format: float
        new_weight:
          type: number
          format: float
        was_active:
          type: boolean
        is_active:
          type: boolean

    EdgeArchivedPayload:
      type: object
      required:
        - event_id
        - event_type
        - timestamp
        - network_id
        - edge_id
        - source_node_id
        - target_node_id
        - final_weight
        - archive_threshold
        - is_active
      properties:
        event_id:
          type: string
        event_type:
          type: string
          enum: [edge.archived]
        timestamp:
          type: string
          format: date-time
        network_id:
          type: integer
        edge_id:
          type: integer
        source_node_id:
          type: integer
        target_node_id:
          type: integer
        final_weight:
          type: number
          format: float
        archive_threshold:
          type: number
          format: float
        is_active:
          type: boolean

    EdgeReactivatedPayload:
      type: object
      required:
        - event_id
        - event_type
        - timestamp
        - network_id
        - edge_id
        - source_node_id
        - target_node_id
        - old_weight
        - new_weight
        - restore_threshold
        - is_active
      properties:
        event_id:
          type: string
        event_type:
          type: string
          enum: [edge.reactivated]
        timestamp:
          type: string
          format: date-time
        network_id:
          type: integer
        edge_id:
          type: integer
        source_node_id:
          type: integer
        target_node_id:
          type: integer
        old_weight:
          type: number
          format: float
        new_weight:
          type: number
          format: float
        restore_threshold:
          type: number
          format: float
        is_active:
          type: boolean